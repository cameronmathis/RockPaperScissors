<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="../home_page/home.css">
    </head>
    <body>
        <header>
           <h1>Rock Paper Scissors</h1>
        </header>

        <form class="EnterUsername">
            <h1>Enter a username</h1>
            <input type="text" class="username" placeholder="Username" id="txtfield">
        </form>

        <div class="actionMessage">
            <p>Select a Gamemode</p>
        </div>

        <div class="choices">
            <div class="choice" id="solo">
                <input type="submit" value="Solo">
            </div>
            <div class="choice" id="findGame">
                <input type="submit" value="Find Game">
            </div>
            <div class="choice" id="createGame">
                <input type="submit" value="Create Game">
            </div>
            <div class="choice" id="enterCode">
                <input type="text" class="EnterCode" placeholder="Enter Code" id="txtfield">
            </div>
        </div>

        <script src="../home_page/home.js" charset="utf-8"></script>
    </body>
</html>
